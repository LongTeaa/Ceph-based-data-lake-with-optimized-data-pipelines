name: ceph-data-lake-local

services:
  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2024-07-16T23-46-41Z}
    container_name: ceph-data-lake-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16.3}
    container_name: ceph-data-lake-postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB_NAME:-airflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    image: ${AIRFLOW_IMAGE:-apache/airflow:2.9.3-python3.11}
    container_name: ceph-data-lake-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    user: "${AIRFLOW_UID:-50000}:0"
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@postgres:5432/${AIRFLOW_DB_NAME:-airflow}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-local-dev-secret-key}
      _PIP_ADDITIONAL_REQUIREMENTS: "-r /opt/airflow/project/docker/airflow/requirements.txt"
      DATA_LAKE_PROJECT_ROOT: /opt/airflow/project
      DATA_LAKE_PYTHON_BIN: python
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE_ACCESS:-true}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      BRONZE_BUCKET: ${BRONZE_BUCKET:-datalake-bronze}
      SILVER_BUCKET: ${SILVER_BUCKET:-datalake-silver}
      GOLD_BUCKET: ${GOLD_BUCKET:-datalake-gold}
      SYSTEM_BUCKET: ${SYSTEM_BUCKET:-datalake-system}
      SPARK_MASTER_URL: ${SPARK_MASTER_URL:-local[*]}
      SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY:-2g}
      SPARK_EXECUTOR_MEMORY: ${SPARK_EXECUTOR_MEMORY:-2g}
      SPARK_SQL_SHUFFLE_PARTITIONS: ${SPARK_SQL_SHUFFLE_PARTITIONS:-8}
      SPARK_JARS_PACKAGES: ${SPARK_JARS_PACKAGES:-org.apache.hadoop:hadoop-aws:3.3.4}
      SPARK_IVY_DIR: ${SPARK_IVY_DIR:-.spark-ivy}
      SPARK_LOCAL_DIR: ${SPARK_LOCAL_DIR:-.spark-tmp}
    volumes: &airflow-common-volumes
      - ..:/opt/airflow/project
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USER:-admin}
      --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
      --firstname Data
      --lastname Lake
      --role Admin
      --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com} || true"

  airflow-webserver:
    image: ${AIRFLOW_IMAGE:-apache/airflow:2.9.3-python3.11}
    container_name: ceph-data-lake-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      <<: *airflow-common-env
    volumes: *airflow-common-volumes
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    image: ${AIRFLOW_IMAGE:-apache/airflow:2.9.3-python3.11}
    container_name: ceph-data-lake-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      <<: *airflow-common-env
    volumes: *airflow-common-volumes
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  minio-data:
  postgres-data:
