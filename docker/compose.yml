name: ceph-data-lake-local

services:
  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2024-07-16T23-46-41Z}
    container_name: ceph-data-lake-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin123}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16.3}
    container_name: ceph-data-lake-postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB_NAME:-airflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    image: ${AIRFLOW_IMAGE:-ceph-data-lake-airflow:2.9.3-python3.11}
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    container_name: ceph-data-lake-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    user: "${AIRFLOW_UID:-50000}:0"
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@postgres:5432/${AIRFLOW_DB_NAME:-airflow}
      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: 9125
      AIRFLOW__METRICS__STATSD_PREFIX: airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-local-dev-secret-key}
      DATA_LAKE_PROJECT_ROOT: /opt/airflow/project
      DATA_LAKE_PYTHON_BIN: python
      DATA_LAKE_SPARK_SUBMIT_BIN: spark-submit
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE_ACCESS:-true}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      BRONZE_BUCKET: ${BRONZE_BUCKET:-datalake-bronze}
      SILVER_BUCKET: ${SILVER_BUCKET:-datalake-silver}
      GOLD_BUCKET: ${GOLD_BUCKET:-datalake-gold}
      SYSTEM_BUCKET: ${SYSTEM_BUCKET:-datalake-system}
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY:-2g}
      SPARK_EXECUTOR_MEMORY: ${SPARK_EXECUTOR_MEMORY:-2g}
      SPARK_SQL_SHUFFLE_PARTITIONS: ${SPARK_SQL_SHUFFLE_PARTITIONS:-8}
      SPARK_JARS_PACKAGES: ${SPARK_JARS_PACKAGES:-org.apache.hadoop:hadoop-aws:3.3.4}
      SPARK_IVY_DIR: /opt/airflow/project/.spark-ivy
      SPARK_LOCAL_DIR: /opt/airflow/project/.spark-tmp
    volumes: &airflow-common-volumes
      - ..:/opt/airflow/project
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USER:-admin}
      --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
      --firstname Data
      --lastname Lake
      --role Admin
      --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com} || true"

  airflow-webserver:
    image: ${AIRFLOW_IMAGE:-ceph-data-lake-airflow:2.9.3-python3.11}
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    container_name: ceph-data-lake-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      statsd-exporter:
        condition: service_started
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      <<: *airflow-common-env
    volumes: *airflow-common-volumes
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    image: ${AIRFLOW_IMAGE:-ceph-data-lake-airflow:2.9.3-python3.11}
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    container_name: ceph-data-lake-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      statsd-exporter:
        condition: service_started
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      <<: *airflow-common-env
    volumes: *airflow-common-volumes
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob"]
      interval: 30s
      timeout: 10s
      retries: 5

  spark-master:
    image: ${SPARK_IMAGE:-ceph-data-lake-spark:3.5.1}
    build:
      context: ..
      dockerfile: docker/spark/Dockerfile
    container_name: ceph-data-lake-spark-master
    user: root
    environment: &spark-common-env
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_MASTER_URL: spark://spark-master:7077
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE_ACCESS:-true}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      BRONZE_BUCKET: ${BRONZE_BUCKET:-datalake-bronze}
      SILVER_BUCKET: ${SILVER_BUCKET:-datalake-silver}
      GOLD_BUCKET: ${GOLD_BUCKET:-datalake-gold}
      SYSTEM_BUCKET: ${SYSTEM_BUCKET:-datalake-system}
      SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY:-2g}
      SPARK_EXECUTOR_MEMORY: ${SPARK_EXECUTOR_MEMORY:-2g}
      SPARK_SQL_SHUFFLE_PARTITIONS: ${SPARK_SQL_SHUFFLE_PARTITIONS:-8}
      SPARK_JARS_PACKAGES: ${SPARK_JARS_PACKAGES:-org.apache.hadoop:hadoop-aws:3.3.4}
      SPARK_IVY_DIR: /tmp/spark-ivy
      SPARK_LOCAL_DIR: /tmp/spark-local
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes: &spark-common-volumes
      - ..:/opt/spark/project
      - ./spark/metrics.properties:/opt/spark/conf/metrics.properties:ro
      - spark-ivy:/tmp/spark-ivy
      - spark-local:/tmp/spark-local
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master
      --port 7077
      --webui-port 8080
    healthcheck:
      test: ["CMD-SHELL", "bash -ec ':</dev/tcp/spark-master/7077'"]
      interval: 20s
      timeout: 10s
      retries: 10

  spark-worker:
    image: ${SPARK_IMAGE:-ceph-data-lake-spark:3.5.1}
    build:
      context: ..
      dockerfile: docker/spark/Dockerfile
    container_name: ceph-data-lake-spark-worker
    user: root
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      <<: *spark-common-env
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-2}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-2g}
    ports:
      - "8082:8081"
    volumes: *spark-common-volumes
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --webui-port 8081
      --cores ${SPARK_WORKER_CORES:-2}
      --memory ${SPARK_WORKER_MEMORY:-2g}

  spark-submit:
    image: ${SPARK_IMAGE:-ceph-data-lake-spark:3.5.1}
    build:
      context: ..
      dockerfile: docker/spark/Dockerfile
    container_name: ceph-data-lake-spark-submit
    user: root
    profiles: ["tools"]
    depends_on:
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_started
      minio:
        condition: service_started
    environment:
      <<: *spark-common-env
      SPARK_MODE: client
      SPARK_MASTER_URL: spark://spark-master:7077
    working_dir: /opt/spark/project
    volumes: *spark-common-volumes
    entrypoint: ["/bin/bash", "-lc"]

  trino:
    image: ${TRINO_IMAGE:-trinodb/trino:455}
    container_name: ceph-data-lake-trino
    user: root
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE_ACCESS:-true}
      S3_USE_SSL: ${S3_USE_SSL:-false}
    ports:
      - "8083:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
      - ./trino/sql:/etc/trino/sql:ro
      - trino-metastore:/var/trino/hive-metastore
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/v1/info || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  statsd-exporter:
    image: ${STATSD_EXPORTER_IMAGE:-prom/statsd-exporter:v0.26.1}
    container_name: ceph-data-lake-statsd-exporter
    command:
      - --statsd.mapping-config=/etc/statsd-exporter/mapping.yml
    ports:
      - "9102:9102"
      - "9125:9125/udp"
    volumes:
      - ./prometheus/statsd-mapping.yml:/etc/statsd-exporter/mapping.yml:ro

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.53.1}
    container_name: ceph-data-lake-prometheus
    depends_on:
      minio:
        condition: service_started
      statsd-exporter:
        condition: service_started
      spark-master:
        condition: service_started
      spark-worker:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.1.0}
    container_name: ceph-data-lake-grafana
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  minio-data:
  postgres-data:
  spark-ivy:
  spark-local:
  trino-metastore:
  prometheus-data:
  grafana-data:
